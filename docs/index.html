<!DOCTYPE html>
<html lang="fo">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Løgtingsval — taka niður app</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f1419;
      --card: #1a2332;
      --text: #e7ecf3;
      --muted: #9aa8bc;
      --accent: #3d8bfd;
      --accent-hover: #61a0ff;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f4f6f9;
        --card: #fff;
        --text: #1a2332;
        --muted: #5c6b80;
        --accent: #1565c0;
        --accent-hover: #0d47a1;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      line-height: 1.5;
    }
    main {
      max-width: 28rem;
      width: 100%;
      background: var(--card);
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 12px 40px rgba(0,0,0,.25);
    }
    h1 {
      font-size: 1.35rem;
      font-weight: 650;
      margin: 0 0 0.35rem;
      letter-spacing: -0.02em;
    }
    p.lead {
      margin: 0 0 1.25rem;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 0.85rem 1.25rem;
      font-size: 1.05rem;
      font-weight: 600;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      transition: background .15s ease;
    }
    .btn:hover { background: var(--accent-hover); }
    .btn:focus-visible {
      outline: 2px solid var(--accent-hover);
      outline-offset: 3px;
    }
    .btn:disabled {
      opacity: .55;
      cursor: not-allowed;
    }
    .status {
      margin-top: 1rem;
      font-size: 0.85rem;
      color: var(--muted);
      min-height: 1.25em;
    }
    .status.err { color: #e57373; }
    footer {
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(128,128,128,.2);
      font-size: 0.8rem;
      color: var(--muted);
    }
    footer a { color: var(--accent); }
  </style>
</head>
<body>
  <main>
    <h1>Løgtingsval</h1>
    <p class="lead">Mac-app (Apple Silicon) við valúrsliti úr KVF. Tak niður ZIP, pakka út og set <code>Logtingsval2026.app</code> á teldina.</p>

    <a id="download" class="btn" href="#" role="button" aria-busy="true">Lesur seinstu útgávu…</a>
    <p id="status" class="status" aria-live="polite"></p>

    <footer>
      <span id="source-wrap" hidden>Kelda: <a id="source" href="#">GitHub</a> · </span>
      Ikki almenn KVF-vørna. Les meira á <a id="readme" href="#">README</a> um bygging.
    </footer>
  </main>

  <script>
(function () {
  var ASSET = 'Logtingsval2026-til-mac-Apple-Silicon.zip';
  /** Set to 'owner/repo' if tú brúkar egnan lénið (CNAME) og kenni ikki sjálvgreinið. */
  var REPO_OVERRIDE = '';

  function detectRepo() {
    if (REPO_OVERRIDE) return REPO_OVERRIDE;
    var h = location.hostname;
    var m = /^([^.]+)\.github\.io$/.exec(h);
    if (!m) return null;
    var owner = m[1];
    var seg = location.pathname.split('/').filter(function (s) {
      return s && s !== 'index.html';
    })[0];
    if (!seg) return null;
    return owner + '/' + seg;
  }

  var btn = document.getElementById('download');
  var statusEl = document.getElementById('status');
  var repo = detectRepo();

  function releasesBase(r) {
    return 'https://github.com/' + r + '/releases';
  }

  function fail(msg) {
    statusEl.textContent = msg;
    statusEl.classList.add('err');
    btn.textContent = 'Rinda útgávur á GitHub';
    btn.removeAttribute('aria-busy');
    if (repo) {
      btn.href = releasesBase(repo);
    } else {
      btn.removeAttribute('href');
      btn.setAttribute('aria-disabled', 'true');
      btn.disabled = true;
    }
  }

  if (!repo) {
    fail('Set REPO_OVERRIDE í index.html ella hosta á user.github.io/repo-name/.');
    return;
  }

  var readme = document.getElementById('readme');
  readme.href = 'https://github.com/' + repo + '#readme';

  var sw = document.getElementById('source-wrap');
  var source = document.getElementById('source');
  source.href = 'https://github.com/' + repo;
  sw.hidden = false;

  var api = 'https://api.github.com/repos/' + repo + '/releases/latest';

  fetch(api)
    .then(function (r) {
      if (!r.ok) throw new Error('GitHub API ' + r.status);
      return r.json();
    })
    .then(function (data) {
      var assets = data.assets || [];
      var zip = assets.find(function (a) { return a.name === ASSET; });
      var url = zip && zip.browser_download_url;
      if (!url) {
        btn.href = releasesBase(repo);
        btn.textContent = 'Rinda ZIP á GitHub';
        statusEl.textContent = 'Seinasta útgáva fann ikki ' + ASSET + '. Smell her fyri at velja skrá.';
        btn.removeAttribute('aria-busy');
        return;
      }
      btn.href = url;
      btn.download = ASSET;
      btn.textContent = 'Tak niður (macOS, Apple Silicon)';
      if (data.tag_name) {
        statusEl.textContent = 'Útgáva: ' + data.tag_name;
      }
      btn.removeAttribute('aria-busy');
    })
    .catch(function () {
      btn.href = releasesBase(repo);
      btn.textContent = 'Rinda niður á GitHub';
      statusEl.textContent = 'Kundi ikki lesa seinasta útgávu sjálvirkt. Smell fyri at finna ZIP.';
      btn.removeAttribute('aria-busy');
    });
})();
  </script>
</body>
</html>
